dcp: 0.1
device:
  id: lamp-kitchen-01
  model: smart_lamp_v1
  vendor: example.dev

intents:
  - name: set_brightness
    params:
      level: { type: float, unit: percent, range: [0, 100] }
      fade:  { type: duration, unit: ms, default: 0 }
    capability: lamp.write
    idempotent: true
    dry_run: true

  - name: set_color
    params:
      r: { type: int, range: [0, 255] }
      g: { type: int, range: [0, 255] }
      b: { type: int, range: [0, 255] }
    capability: lamp.write
    idempotent: true
    dry_run: true

  - name: read_brightness
    returns: { type: float, unit: percent }
    capability: lamp.read

  - name: blink
    params:
      times:  { type: int,      range: [1, 20],     default: 3 }
      period: { type: duration, unit: ms, range: [50, 2000], default: 200 }
    capability: lamp.write
    idempotent: false     # blink(3) twice = 6 blinks, not 3
    dry_run: true

events:
  - name: motion_detected
    payload:
      confidence: { type: float, unit: ratio, range: [0, 1] }
    capability: lamp.read
