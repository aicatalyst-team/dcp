apiVersion: batch/v1
kind: Job
metadata:
  name: dcp-lamp-demo
  namespace: autopoc-test-builds
  labels:
    app: dcp
    autopoc.io/project: dcp
    autopoc.io/scenario: lamp-demo
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 60
  template:
    spec:
      containers:
        - name: dcp
          image: image-registry.openshift-image-registry.svc:5000/autopoc-test-builds/dcp:latest
          imagePullPolicy: Always
          command: ["python"]
          args: ["examples/lamp_demo.py"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
