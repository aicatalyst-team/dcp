apiVersion: batch/v1
kind: Job
metadata:
  name: dcp-test-suite
  namespace: autopoc-test-builds
  labels:
    app: dcp
    autopoc.io/project: dcp
    autopoc.io/scenario: test-suite
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 180
  template:
    spec:
      containers:
        - name: dcp
          image: image-registry.openshift-image-registry.svc:5000/autopoc-test-builds/dcp:latest
          imagePullPolicy: Always
          command: ["pytest"]
          args: ["tests/", "-v", "--timeout=60"]
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
