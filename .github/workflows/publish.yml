name: publish to PyPI

# Two triggers:
#   1. Every GitHub Release published -> auto-upload to PyPI
#   2. Manual run via Actions tab    -> useful for re-publishing the
#      current release after Trusted Publisher is configured the first time.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tool
        run: python -m pip install --upgrade build
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The PyPI Trusted Publisher entry is scoped to this environment name.
    # Create the matching environment under repo Settings -> Environments
    # so PyPI's OIDC verification has something to bind to.
    environment:
      name: pypi
      url: https://pypi.org/p/pydcp
    permissions:
      id-token: write   # required for PyPI's OIDC trusted-publisher flow
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
